<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="sytels.css">
</head>
<body>
    <ul id="wichtige_Liste">
        <li>1</li>
        <li>2</li>
        <li>3</li>
    </ul>

    <script>
        const item = document.querySelectorAll("#wichtige_Liste > li");
        item.forEach(item => {
            item.addEventListener('click', () => {
                item.classList.toggle('active');
                })
            }
        )
    </script>
</body>
</html>
